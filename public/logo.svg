  <line x1="60" y1="15" x2="60" y2="92" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="25" y1="60" x2="95" y2="60" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Kite tail -->
  <path d="M60 92 C55 100 45 103 48 110 C51 117 62 112 65 105" stroke="#0891b2" stroke-width="2.5" stroke-linecap="round" fill="none"/>
